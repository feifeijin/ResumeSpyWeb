<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#121212"/>
  <!-- Magnifying glass circle -->
  <circle cx="13" cy="13" r="7" stroke="#c8a951" stroke-width="2.5" fill="none"/>
  <!-- Lens inner fill -->
  <circle cx="13" cy="13" r="5" fill="rgba(200,169,81,0.08)"/>
  <!-- Letter R inside lens -->
  <text x="10" y="17" font-family="'IBM Plex Mono', monospace" font-size="8" font-weight="700" fill="#c8a951">R</text>
  <!-- Handle -->
  <line x1="18.5" y1="18.5" x2="27" y2="27" stroke="#c8a951" stroke-width="2.5" stroke-linecap="round"/>
</svg>
